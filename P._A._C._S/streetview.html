<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
  #sv  { width: 100%; height: 100%; }
  #msg {
    display: none; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #888; font-family: sans-serif; font-size: 14px;
    text-align: center; padding: 24px; pointer-events: none;
    line-height: 1.6;
  }
</style>
</head>
<body style="background:#111">
  <div id="sv"></div>
  <div id="msg"></div>
  <script>
    function _svInit() {
      var params  = new URLSearchParams(window.location.search);
      var lat     = parseFloat(params.get('lat'));
      var lng     = parseFloat(params.get('lng'));
      var heading = parseFloat(params.get('heading') || '0');
      if (isNaN(lat) || isNaN(lng)) {
        _showMsg('Clicca sulla mappa per aprire Street View');
        return;
      }
      var pos = { lat: lat, lng: lng };
      var svc = new google.maps.StreetViewService();
      svc.getPanorama({ location: pos, radius: 150 }, function(data, status) {
        if (status === google.maps.StreetViewStatus.OK) {
          new google.maps.StreetViewPanorama(document.getElementById('sv'), {
            position: pos,
            pov: { heading: heading, pitch: 0 },
            zoom: 1,
            addressControl: false,
            fullscreenControl: false,
            motionTracking: false,
            motionTrackingControl: false
          });
        } else {
          _showMsg('\u26a0\ufe0f Street View non disponibile<br>in questo punto');
        }
      });
    }
    function _showMsg(txt) {
      var m = document.getElementById('msg');
      m.style.display = 'block';
      m.innerHTML = txt;
    }
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?callback=_svInit" defer></script>
</body>
</html>
